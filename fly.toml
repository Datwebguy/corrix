# Corrix CAP provider — always-on Fly app
# https://fly.io/docs/reference/configuration/

app = "corrix-provider"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  CROO_API_URL = "https://api.croo.network"
  CROO_WS_URL = "wss://api.croo.network/ws"

# Public health only — CAP traffic is outbound WebSocket to CROO
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  # Single machine — one CAP provider identity (avoid dual accept races)
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health"

[[vm]]
  # 256MB OOMed (node OOM killed repeatedly). 512MB is the floor for tsx + SDK.
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
